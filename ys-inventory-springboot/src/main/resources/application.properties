# ============ DATABASE ============
# ${VAR:default} syntax: uses the environment variable if set (cloud),
# otherwise falls back to the default after the colon (local laptop).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ys_inventory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Invent0011}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============ JPA / HIBERNATE ============
# "update" = Hibernate looks at your @Entity classes and creates/updates
# tables to match automatically. No schema.sql needed at all anymore!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============ SERVER ============
# Render assigns a random port via the PORT env var — this line makes sure
# we listen on whatever port the cloud gives us, and 8080 locally otherwise.
server.port=${PORT:8080}

# ============ SESSION ============
server.servlet.session.timeout=120m
